name: android-release-unsigned

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Generate Android project
        run: npx expo prebuild --platform android --non-interactive

      - name: Build release APK
        run: ./gradlew assembleRelease
        working-directory: android

      - name: Build release AAB
        run: ./gradlew bundleRelease
        working-directory: android

      - name: Upload unsigned release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: baby-weekly-companion-unsigned-release
          path: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab

      - name: Generate release tag
        id: release_meta
        run: |
          echo "tag=android-unsigned-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "name=Android Unsigned Build ${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          generate_release_notes: true
          prerelease: true
          files: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab
