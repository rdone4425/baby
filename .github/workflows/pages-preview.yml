name: pages-preview

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Export web bundle
        run: npx expo export --platform web

      - name: Upload web export artifact
        uses: actions/upload-artifact@v4
        with:
          name: pages-preview
          path: dist
